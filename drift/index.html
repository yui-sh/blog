// ============================================================
// PARSE
// ============================================================
function parseData(raw) {
  const predictions = [];
  const checks = [];
  const drifts = [];
  const observations = [];

  for (const entry of raw) {
    const ts = new Date(entry.timestamp);
    if (entry.prediction) {
      predictions.push({
        timestamp: ts,
        claim: entry.prediction.claim,
        horizon: entry.prediction.horizon_hours,
        observable: entry.prediction.observable,
        heartbeat: entry.heartbeat_id,
        ref: entry.timestamp
      });
    }
    if (entry.checks) {
      for (const c of entry.checks) {
        checks.push({
          timestamp: ts,
          predictionRef: c.prediction_ref,
          result: c.external_check || c.result || 'unknown',
          selfScore: c.self_score,
          notes: c.notes,
          heartbeat: entry.heartbeat_id
        });
      }
    }
    if (entry.drift) {
      drifts.push({
        timestamp: ts,
        description: entry.drift.delta || entry.drift.description || entry.drift.detected,
        cause: entry.drift.cause_tag || entry.drift.cause || 'unknown',
        severity: entry.drift.severity || 0.5,
        heartbeat: entry.heartbeat_id
      });
    }
    if (entry.observation) {
      observations.push({
        timestamp: ts,
        description: entry.observation.description,
        heartbeat: entry.heartbeat_id
      });
    }
  }

  // Match predictions to their check results
  const checkMap = {};
  for (const c of checks) {
    checkMap[c.predictionRef] = c;
  }
  for (const p of predictions) {
    const check = checkMap[p.ref];
    if (check) {
      p.result = check.result;
      p.selfScore = check.selfScore;
      p.checkNotes = check.notes;
      p.checkTime = check.timestamp;
    } else {
      p.result = 'pending';
    }
  }

  return { predictions, checks, drifts, observations };
}

const data = parseData(RAW_DATA);

  const cards = [
    { number: data.predictions.length, label: 'Predictions', color: 'var(--accent)' },
    { number: `${accuracy}%`, label: 'Accuracy', color: passed > failed ? 'var(--green)' : 'var(--red)' },
    { number: passed, label: 'Correct', color: 'var(--green)' },
    { number: failed, label: 'Wrong', color: 'var(--red)' },
    { number: partial, label: 'Partial', color: 'var(--orange)' },
    { number: pending, label: 'Pending', color: 'var(--fg-muted)' },
    { number: data.drifts.length, label: 'Drift Events', color: 'var(--purple)' },
  ];

  const row = document.getElementById('stats-row');
  row.innerHTML = cards.map(c => `
    <div class="stat-card">
      <div class="number" style="color: ${c.color}">${c.number}</div>
      <div class="label">${c.label}</div>
    </div>
  `).join('');
}

// ============================================================
// CHARTS
// ============================================================
const chartDefaults = {
  responsive: true,
  maintainAspectRatio: true,
  plugins: {
    legend: { labels: { color: '#8b949e', font: { size: 12 } } }
  }
};

function renderAccuracyTimeline() {
  const ctx = document.getElementById('accuracy-timeline').getContext('2d');
  
  // Sort predictions by timestamp
  const sorted = [...data.predictions].sort((a, b) => a.timestamp - b.timestamp);
  
  // Build cumulative accuracy
  const points = [];
  let correct = 0, total = 0;
  
  for (const p of sorted) {
    if (p.result === 'pending') continue;
    total++;
    if (p.result === 'pass') correct++;
    else if (p.result === 'partial') correct += 0.5;
    
    points.push({
      x: p.checkTime || p.timestamp,
      y: (correct / total * 100),
      claim: p.claim
    });
  }

  // Also plot individual predictions as scatter
  const scatterPoints = sorted.map(p => ({
    x: p.timestamp,
    y: p.result === 'pass' ? 100 : p.result === 'partial' ? 50 : p.result === 'fail' ? 0 : null,
    claim: p.claim,
    result: p.result
  })).filter(p => p.y !== null);

  new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [
        {
          label: 'Cumulative Accuracy %',
          data: points,
          borderColor: '#58a6ff',
          backgroundColor: 'rgba(88, 166, 255, 0.1)',
          fill: true,
          tension: 0.3,
          pointRadius: 4,
          pointHoverRadius: 6,
        },
        {
          label: 'Individual Predictions',
          type: 'scatter',
          data: scatterPoints,
          pointRadius: 6,
          pointHoverRadius: 8,
          pointBackgroundColor: scatterPoints.map(p => 
            p.result === 'pass' ? '#3fb950' : 
            p.result === 'partial' ? '#d29922' : '#f85149'
          ),
          pointBorderColor: 'transparent',
        }
      ]
    },
    options: {
      ...chartDefaults,
      scales: {
        x: {
          type: 'time',
          time: { unit: 'day', displayFormats: { day: 'MMM d' } },
          grid: { color: 'rgba(48, 54, 61, 0.5)' },
          ticks: { color: '#8b949e' }
        },
        y: {
          min: 0, max: 100,
          grid: { color: 'rgba(48, 54, 61, 0.5)' },
          ticks: { color: '#8b949e', callback: v => v + '%' }
        }
      },
      plugins: {
        ...chartDefaults.plugins,
        tooltip: {
          callbacks: {
            label: function(ctx) {
              const p = ctx.raw;
              if (p.claim) return p.claim.substring(0, 80) + '...';
              return `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(0)}%`;
            }
          }
        }
      }
    }
  });
}

function renderOutcomesChart() {
  const ctx = document.getElementById('outcomes-chart').getContext('2d');
  
  const counts = { pass: 0, fail: 0, partial: 0, pending: 0 };
  for (const p of data.predictions) {
    counts[p.result] = (counts[p.result] || 0) + 1;
  }

  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Correct', 'Wrong', 'Partial', 'Pending'],
      datasets: [{
        data: [counts.pass, counts.fail, counts.partial, counts.pending],
        backgroundColor: [
          'rgba(63, 185, 80, 0.8)',
          'rgba(248, 81, 73, 0.8)',
          'rgba(210, 153, 34, 0.8)',
          'rgba(88, 166, 255, 0.3)',
        ],
        borderColor: '#161b22',
        borderWidth: 2,
      }]
    },
    options: {
      ...chartDefaults,
      plugins: {
        ...chartDefaults.plugins,
        title: {
          display: true,
          text: 'Prediction Outcomes',
          color: '#c9d1d9',
          font: { size: 14 }
        }
      }
    }
  });
}

function renderCausesChart() {
  const ctx = document.getElementById('causes-chart').getContext('2d');
  
  const causes = {};
  for (const d of data.drifts) {
    causes[d.cause] = (causes[d.cause] || 0) + 1;
  }

  const causeColors = {
    context_loss: 'rgba(248, 81, 73, 0.8)',
    retrieval: 'rgba(210, 153, 34, 0.8)',
    spec_change: 'rgba(88, 166, 255, 0.8)',
    overconfidence: 'rgba(188, 140, 255, 0.8)',
    unknown: 'rgba(139, 148, 158, 0.8)',
  };

  const labels = Object.keys(causes).map(c => c.replace('_', ' '));
  const values = Object.values(causes);
  const colors = Object.keys(causes).map(c => causeColors[c] || causeColors.unknown);

  if (values.length === 0) {
    ctx.canvas.parentElement.innerHTML = '<div class="empty-state">No drift events yet</div>';
    return;
  }

  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: labels,
      datasets: [{
        data: values,
        backgroundColor: colors,
        borderColor: '#161b22',
        borderWidth: 2,
      }]
    },
    options: {
      ...chartDefaults,
      plugins: {
        ...chartDefaults.plugins,
        title: {
          display: true,
          text: 'Drift Causes',
          color: '#c9d1d9',
          font: { size: 14 }
        }
      }
    }
  });
}

function renderDriftTimeline() {
  const ctx = document.getElementById('drift-timeline').getContext('2d');
  
  if (data.drifts.length === 0) {
    ctx.canvas.parentElement.innerHTML = '<div class="empty-state">No drift events recorded yet</div>';
    return;
  }

  const points = data.drifts.map(d => ({
    x: d.timestamp,
    y: d.severity,
    description: d.description,
    cause: d.cause
  }));

  const causeColors = {
    context_loss: '#f85149',
    retrieval: '#d29922',
    spec_change: '#58a6ff',
    overconfidence: '#bc8cff',
    unknown: '#8b949e',
  };

  new Chart(ctx, {
    type: 'scatter',
    data: {
      datasets: [{
        label: 'Drift Events',
        data: points,
        pointRadius: points.map(p => 6 + p.y * 10),
        pointHoverRadius: points.map(p => 8 + p.y * 10),
        pointBackgroundColor: points.map(p => causeColors[p.cause] || causeColors.unknown),
        pointBorderColor: 'rgba(255,255,255,0.2)',
        pointBorderWidth: 1,
      }]
    },
    options: {
      ...chartDefaults,
      scales: {
        x: {
          type: 'time',
          time: { unit: 'day', displayFormats: { day: 'MMM d' } },
          grid: { color: 'rgba(48, 54, 61, 0.5)' },
          ticks: { color: '#8b949e' }
        },
        y: {
          min: 0, max: 1,
          title: { display: true, text: 'Severity', color: '#8b949e' },
          grid: { color: 'rgba(48, 54, 61, 0.5)' },
          ticks: { color: '#8b949e' }
        }
      },
      plugins: {
        ...chartDefaults.plugins,
        tooltip: {
          callbacks: {
            label: function(ctx) {
              const p = ctx.raw;
              return [
                `Severity: ${p.y}`,
                `Cause: ${p.cause}`,
                p.description ? p.description.substring(0, 80) + '...' : ''
              ];
            }
          }
        }
      }
    }
  });
}

// ============================================================
// EVENT LOG
// ============================================================
function renderEventLog(filter = 'all') {
  const list = document.getElementById('event-list');
  
  // Build unified event list
  let events = [];
  
  for (const p of data.predictions) {
    events.push({
      type: 'prediction',
      timestamp: p.timestamp,
      badge: p.result,
      title: p.claim,
      details: {
        'Observable': p.observable,
        'Horizon': p.horizon ? `${p.horizon}h` : '—',
        'Result': p.result,
        'Self Score': p.selfScore !== undefined ? p.selfScore : '—',
        'Notes': p.checkNotes || '—',
      }
    });
  }

  for (const d of data.drifts) {
    events.push({
      type: 'drift',
      timestamp: d.timestamp,
      badge: 'drift',
      title: d.description,
      details: {
        'Cause': d.cause,
        'Severity': d.severity,
        'Heartbeat': d.heartbeat,
      }
    });
  }

  for (const o of data.observations) {
    events.push({
      type: 'observation',
      timestamp: o.timestamp,
      badge: 'observation',
      title: o.description,
      details: {
        'Heartbeat': o.heartbeat,
      }
    });
  }

  // Filter
  if (filter === 'predictions') events = events.filter(e => e.type === 'prediction');
  if (filter === 'checks') events = events.filter(e => e.type === 'prediction' && e.badge !== 'pending');
  if (filter === 'drifts') events = events.filter(e => e.type === 'drift');

  // Sort by time, newest first
  events.sort((a, b) => b.timestamp - a.timestamp);

  if (events.length === 0) {
    list.innerHTML = '<div class="empty-state">No events in this category</div>';
    return;
  }

  list.innerHTML = events.map(e => {
    const badgeClass = e.badge === 'pass' ? 'badge-pass' : 
                       e.badge === 'fail' ? 'badge-fail' :
                       e.badge === 'partial' ? 'badge-partial' :
                       e.badge === 'drift' ? 'badge-drift' :
                       e.badge === 'observation' ? 'badge-observation' :
                       'badge-pending';
    
    const badgeLabel = e.badge === 'drift' ? '⚡ drift' : 
                       e.badge === 'observation' ? '👁 observation' :
                       e.badge;

    const detailsHtml = Object.entries(e.details)
      .map(([k, v]) => `<div class="event-detail-row"><strong>${k}:</strong> ${v}</div>`)
      .join('');

    const timeStr = e.timestamp.toLocaleDateString('en-US', { 
      month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' 
    });

    return `
      <li class="event-item" onclick="this.classList.toggle('expanded')">
        <div class="event-header">
          <span class="event-time">${timeStr}</span>
          <span class="event-badge ${badgeClass}">${badgeLabel}</span>
        </div>
        <div class="event-claim">${escapeHtml(e.title)}</div>
        <div class="event-details">${detailsHtml}</div>
      </li>
    `;
  }).join('');
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ============================================================
// TABS
// ============================================================
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderEventLog(btn.dataset.tab);
  });
});

// ============================================================
// INIT
// ============================================================
function init() {
  renderStats();
  renderAccuracyTimeline();
  renderOutcomesChart();
  renderCausesChart();
  renderDriftTimeline();
  renderEventLog();

  // Last updated
  const allTimestamps = RAW_DATA.map(e => new Date(e.timestamp));
  const latest = new Date(Math.max(...allTimestamps));
  document.getElementById('last-updated').textContent = latest.toLocaleDateString('en-US', {
    month: 'short', day: 'numeric', year: 'numeric'
  });
}

init();
</script>
