<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐺 Jinrou — AI Werewolf Replay Explorer</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --border: #30363d;
      --fg: #c9d1d9;
      --fg-muted: #8b949e;
      --accent: #58a6ff;
      --red: #f85149;
      --green: #3fb950;
      --orange: #d29922;
      --purple: #bc8cff;
      --pink: #f778ba;
      --cyan: #39d2c0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    /* Layout */
    .app { display: flex; flex-direction: column; height: 100vh; }
    
    header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    header h1 { font-size: 18px; white-space: nowrap; }
    header h1 a { color: var(--fg); text-decoration: none; }
    
    .header-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      flex: 1;
    }

    .game-select {
      background: var(--surface);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 13px;
      max-width: 400px;
    }

    .header-meta {
      color: var(--fg-muted);
      font-size: 12px;
      margin-left: auto;
    }

    .header-meta a { color: var(--accent); text-decoration: none; }

    .main { display: flex; flex: 1; overflow: hidden; }

    /* Sidebar - Players */
    .sidebar {
      width: 240px;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      flex-shrink: 0;
      padding: 12px;
    }

    .sidebar h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--fg-muted);
      margin-bottom: 8px;
    }

    .player-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .player-card:hover { border-color: var(--accent); }
    .player-card.selected { border-color: var(--accent); background: var(--surface2); }
    .player-card.dead { opacity: 0.4; }
    .player-card.dead .player-name { text-decoration: line-through; }

    .player-header { display: flex; align-items: center; gap: 6px; }
    .player-name { font-weight: 600; font-size: 13px; }
    .player-model { font-size: 11px; color: var(--fg-muted); }
    
    .role-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
      font-weight: 600;
      margin-left: auto;
    }

    .role-werewolf { background: rgba(248,81,73,0.15); color: var(--red); }
    .role-villager { background: rgba(63,185,80,0.15); color: var(--green); }
    .role-seer { background: rgba(188,140,255,0.15); color: var(--purple); }
    .role-doctor { background: rgba(57,210,192,0.15); color: var(--cyan); }

    /* Game info */
    .game-info {
      padding: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 12px;
    }

    .game-info .winner { font-weight: 600; }
    .game-info .winner.wolves { color: var(--red); }
    .game-info .winner.village { color: var(--green); }

    /* Timeline */
    .timeline-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .phase-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      flex-shrink: 0;
      overflow-x: auto;
    }

    .phase-tab {
      padding: 8px 16px;
      font-size: 13px;
      color: var(--fg-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.15s;
    }

    .phase-tab:hover { color: var(--fg); }
    .phase-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .phase-tab .phase-icon { margin-right: 4px; }

    .timeline {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .event {
      margin-bottom: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      position: relative;
    }

    .event.highlight { border-color: var(--accent); }

    .event-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .event-player {
      font-weight: 600;
      font-size: 13px;
    }

    .event-type {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
      background: var(--surface2);
      color: var(--fg-muted);
    }

    .event-message {
      font-size: 14px;
      line-height: 1.6;
      margin-top: 4px;
    }

    .event-reasoning {
      margin-top: 8px;
      padding: 8px 12px;
      background: rgba(210,153,34,0.08);
      border-left: 3px solid var(--orange);
      border-radius: 0 6px 6px 0;
      font-size: 13px;
      color: var(--fg-muted);
      display: none;
    }

    .event-reasoning.visible { display: block; }
    .event-reasoning .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--orange);
      margin-bottom: 2px;
    }

    .event.announcement {
      background: var(--surface2);
      border-color: transparent;
      text-align: center;
      font-size: 13px;
      color: var(--fg-muted);
      padding: 6px 14px;
    }

    .event.night-action {
      border-left: 3px solid var(--purple);
    }

    .event.vote-event {
      padding: 6px 14px;
      font-size: 13px;
    }

    .vote-target { color: var(--red); font-weight: 600; }

    /* Controls */
    .controls {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .btn {
      background: var(--surface);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .toggle-reasoning {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--fg-muted);
      cursor: pointer;
    }

    .toggle-reasoning input { accent-color: var(--orange); }

    /* Loading / Empty */
    .loading, .empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--fg-muted);
      font-size: 14px;
    }

    /* Color coding for players */
    .color-0 { color: #58a6ff; }
    .color-1 { color: #f85149; }
    .color-2 { color: #3fb950; }
    .color-3 { color: #d29922; }
    .color-4 { color: #bc8cff; }
    .color-5 { color: #f778ba; }
    .color-6 { color: #39d2c0; }
    .color-7 { color: #ffa657; }

    /* Responsive */
    @media (max-width: 768px) {
      .main { flex-direction: column; }
      .sidebar { width: 100%; max-height: 200px; border-right: none; border-bottom: 1px solid var(--border); }
      .sidebar .player-cards { display: flex; flex-wrap: wrap; gap: 4px; }
      .player-card { flex: 1; min-width: 140px; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--fg-muted); }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1><a href="#">🐺 Jinrou</a></h1>
      <div class="header-controls">
        <select class="game-select" id="game-select">
          <option value="">Select a game...</option>
        </select>
      </div>
      <div class="header-meta">
        <a href="../2026/03/09/ai-deception-werewolf/">Read the blog post</a> ·
        <a href="https://github.com/yui-sh">yui-sh</a>
      </div>
    </header>

    <div class="main">
      <div class="sidebar" id="sidebar">
        <div class="game-info" id="game-info" style="display:none"></div>
        <h3>Players</h3>
        <div class="player-cards" id="player-cards">
          <div class="empty">Select a game to begin</div>
        </div>
      </div>

      <div class="timeline-container">
        <div class="phase-tabs" id="phase-tabs"></div>
        <div class="timeline" id="timeline">
          <div class="empty">🐺 Pick a game from the dropdown to watch AI agents deceive each other</div>
        </div>
        <div class="controls">
          <label class="toggle-reasoning">
            <input type="checkbox" id="show-reasoning"> 
            💭 Show private reasoning
          </label>
          <div style="margin-left: auto; display: flex; gap: 8px;">
            <button class="btn" id="btn-prev" disabled>← Prev phase</button>
            <button class="btn" id="btn-next" disabled>Next phase →</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // State
    let game = null;
    let phases = [];
    let currentPhaseIdx = 0;
    let showReasoning = false;
    let selectedPlayer = null;
    let deadPlayers = new Set();

    const playerColors = {};

    // DOM
    const gameSelect = document.getElementById('game-select');
    const gameInfo = document.getElementById('game-info');
    const playerCards = document.getElementById('player-cards');
    const phaseTabs = document.getElementById('phase-tabs');
    const timeline = document.getElementById('timeline');
    const reasoningToggle = document.getElementById('show-reasoning');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');

    // Load game index
    async function init() {
      try {
        const res = await fetch('games/index.json');
        const index = await res.json();
        
        index.forEach(g => {
          const opt = document.createElement('option');
          opt.value = g.file;
          const star = g.featured ? '⭐ ' : '';
          opt.textContent = `${star}#${g.id} — ${g.description}`;
          gameSelect.appendChild(opt);
        });

        // Auto-load featured game
        const featured = index.find(g => g.featured);
        if (featured) {
          gameSelect.value = featured.file;
          loadGame(featured.file);
        }
      } catch (e) {
        console.error('Failed to load index:', e);
      }
    }

    // Load a game
    async function loadGame(file) {
      timeline.innerHTML = '<div class="loading">Loading game...</div>';
      
      try {
        const res = await fetch(`games/${file}`);
        game = await res.json();
        deadPlayers = new Set();
        selectedPlayer = null;
        
        // Assign colors
        game.players.forEach((p, i) => {
          playerColors[p.id] = `color-${i}`;
        });

        // Build phases
        buildPhases();
        renderSidebar();
        renderPhaseTabs();
        selectPhase(0);
        
        btnPrev.disabled = false;
        btnNext.disabled = false;
      } catch (e) {
        timeline.innerHTML = `<div class="empty">Failed to load game: ${e.message}</div>`;
      }
    }

    // Build phase list from timeline
    function buildPhases() {
      phases = [];
      const phaseMap = new Map();
      
      game.timeline.forEach(ev => {
        const isNight = ev.phase === 'Night' || ev.type === 'night_action';
        const key = `${isNight ? 'night' : 'day'}_${ev.day}`;
        
        if (!phaseMap.has(key)) {
          phaseMap.set(key, {
            key,
            day: ev.day,
            isNight,
            label: isNight ? `🌙 Night ${ev.day}` : `☀️ Day ${ev.day}`,
            events: []
          });
        }
        phaseMap.get(key).events.push(ev);
      });
      
      phases = Array.from(phaseMap.values());
      // Sort: Night 0 first (opening night), then Day X before Night X
      // Game flow: Night 0 → Day 1 → Night 1 → Day 2 → Night 2 → ...
      phases.sort((a, b) => {
        const orderA = a.isNight ? (a.day === 0 ? -1 : a.day + 0.5) : a.day;
        const orderB = b.isNight ? (b.day === 0 ? -1 : b.day + 0.5) : b.day;
        return orderA - orderB;
      });
    }

    // Render sidebar
    function renderSidebar() {
      // Game info
      gameInfo.style.display = 'block';
      const isWolves = game.winner === 'Werewolves';
      gameInfo.innerHTML = `
        <div>Game <strong>#${game.game_number}</strong></div>
        <div>Winner: <span class="winner ${isWolves ? 'wolves' : 'village'}">${isWolves ? '🐺 Werewolves' : '🏘️ Villagers'}</span></div>
        <div>${game.total_days} days · ${game.timeline.length} events</div>
      `;

      // Player cards
      playerCards.innerHTML = '';
      game.players.forEach((p, i) => {
        const card = document.createElement('div');
        card.className = `player-card`;
        card.dataset.playerId = p.id;
        
        const roleClass = `role-${p.role.toLowerCase()}`;
        card.innerHTML = `
          <div class="player-header">
            <span class="player-name ${playerColors[p.id]}">${p.id}</span>
            <span class="role-badge ${roleClass}">${p.role}</span>
          </div>
          <div class="player-model">${p.model}</div>
        `;
        
        card.addEventListener('click', () => {
          if (selectedPlayer === p.id) {
            selectedPlayer = null;
            card.classList.remove('selected');
          } else {
            document.querySelectorAll('.player-card.selected').forEach(c => c.classList.remove('selected'));
            selectedPlayer = p.id;
            card.classList.add('selected');
          }
          renderTimeline();
        });
        
        playerCards.appendChild(card);
      });
    }

    // Update dead players based on current phase
    function updateDeadPlayers() {
      deadPlayers = new Set();
      
      for (let i = 0; i <= currentPhaseIdx; i++) {
        phases[i].events.forEach(ev => {
          if (ev.type === 'announcement') {
            const desc = ev.description || '';
            // Check for eliminations
            const elimMatch = desc.match(/player "(\w+)"/);
            if (elimMatch) {
              deadPlayers.add(elimMatch[1]);
            }
            const exileMatch = desc.match(/"(\w+)" has been exiled/);
            if (exileMatch) {
              deadPlayers.add(exileMatch[1]);
            }
          }
        });
      }
      
      // Update player card styles
      document.querySelectorAll('.player-card').forEach(card => {
        const pid = card.dataset.playerId;
        card.classList.toggle('dead', deadPlayers.has(pid));
      });
    }

    // Render phase tabs
    function renderPhaseTabs() {
      phaseTabs.innerHTML = '';
      phases.forEach((phase, i) => {
        const tab = document.createElement('div');
        tab.className = `phase-tab ${i === currentPhaseIdx ? 'active' : ''}`;
        tab.textContent = phase.label;
        tab.addEventListener('click', () => selectPhase(i));
        phaseTabs.appendChild(tab);
      });
    }

    // Select a phase
    function selectPhase(idx) {
      if (idx < 0 || idx >= phases.length) return;
      currentPhaseIdx = idx;
      
      // Update tabs
      document.querySelectorAll('.phase-tab').forEach((tab, i) => {
        tab.classList.toggle('active', i === idx);
      });
      
      // Scroll active tab into view
      const activeTab = document.querySelector('.phase-tab.active');
      if (activeTab) activeTab.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      
      updateDeadPlayers();
      renderTimeline();
      
      btnPrev.disabled = idx === 0;
      btnNext.disabled = idx === phases.length - 1;
    }

    // Render timeline events for current phase
    function renderTimeline() {
      const phase = phases[currentPhaseIdx];
      if (!phase) return;
      
      timeline.innerHTML = '';
      
      let events = phase.events;
      if (selectedPlayer) {
        events = events.filter(ev => 
          ev.player === selectedPlayer || 
          ev.target === selectedPlayer || 
          ev.type === 'announcement'
        );
      }
      
      events.forEach(ev => {
        const el = document.createElement('div');
        
        if (ev.type === 'announcement') {
          el.className = 'event announcement';
          el.textContent = `📢 ${ev.description}`;
        } else if (ev.type === 'chat') {
          el.className = 'event chat-event';
          if (selectedPlayer && ev.player === selectedPlayer) el.classList.add('highlight');
          
          const role = game.players.find(p => p.id === ev.player)?.role || '';
          const isWolf = role === 'Werewolf';
          
          el.innerHTML = `
            <div class="event-header">
              <span class="event-player ${playerColors[ev.player]}">${ev.player}</span>
              ${isWolf ? '<span class="event-type" style="color:var(--red)">🐺 wolf</span>' : ''}
              ${ev.threat_level ? `<span class="event-type">${ev.threat_level}</span>` : ''}
            </div>
            <div class="event-message">${escapeHtml(ev.message)}</div>
            ${ev.reasoning ? `
              <div class="event-reasoning ${showReasoning ? 'visible' : ''}">
                <div class="label">💭 Private Reasoning</div>
                ${escapeHtml(ev.reasoning)}
              </div>
            ` : ''}
          `;
        } else if (ev.type === 'vote') {
          el.className = 'event vote-event';
          const role = game.players.find(p => p.id === ev.player)?.role || '';
          const isWolf = role === 'Werewolf';
          
          el.innerHTML = `
            <div class="event-header">
              <span class="event-player ${playerColors[ev.player]}">${ev.player}</span>
              <span class="event-type">🗳️ vote</span>
              ${isWolf ? '<span class="event-type" style="color:var(--red)">🐺</span>' : ''}
            </div>
            <div>votes to exile <span class="vote-target">${ev.target}</span></div>
            ${ev.reasoning ? `
              <div class="event-reasoning ${showReasoning ? 'visible' : ''}">
                <div class="label">💭 Private Reasoning</div>
                ${escapeHtml(ev.reasoning)}
              </div>
            ` : ''}
          `;
        } else if (ev.type === 'night_action') {
          el.className = 'event night-action';
          
          const actionEmoji = {
            'Eliminate': '🔪',
            'Inspect': '🔍',
            'Heal': '💊'
          }[ev.action] || '❓';
          
          el.innerHTML = `
            <div class="event-header">
              <span class="event-player ${playerColors[ev.player]}">${ev.player}</span>
              <span class="event-type">${actionEmoji} ${ev.action}</span>
            </div>
            <div>${actionEmoji} ${ev.action}${ev.target ? ` → <strong>${ev.target}</strong>` : ''}</div>
            ${ev.reasoning ? `
              <div class="event-reasoning ${showReasoning ? 'visible' : ''}">
                <div class="label">💭 Private Reasoning</div>
                ${escapeHtml(ev.reasoning)}
              </div>
            ` : ''}
          `;
        }
        
        timeline.appendChild(el);
      });
      
      if (events.length === 0) {
        timeline.innerHTML = '<div class="empty">No events for this player in this phase</div>';
      }
      
      // Scroll to top
      timeline.scrollTop = 0;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // Event listeners
    gameSelect.addEventListener('change', (e) => {
      if (e.target.value) loadGame(e.target.value);
    });

    reasoningToggle.addEventListener('change', (e) => {
      showReasoning = e.target.checked;
      document.querySelectorAll('.event-reasoning').forEach(el => {
        el.classList.toggle('visible', showReasoning);
      });
    });

    btnPrev.addEventListener('click', () => selectPhase(currentPhaseIdx - 1));
    btnNext.addEventListener('click', () => selectPhase(currentPhaseIdx + 1));

    // Keyboard nav
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') selectPhase(currentPhaseIdx - 1);
      if (e.key === 'ArrowRight') selectPhase(currentPhaseIdx + 1);
      if (e.key === 'r') {
        reasoningToggle.checked = !reasoningToggle.checked;
        reasoningToggle.dispatchEvent(new Event('change'));
      }
    });

    // Init
    init();
  </script>
</body>
</html>
